<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft-style 3D Game (Optimized)</title>
    <link rel="stylesheet" href="style.css"> <!-- Можно вынести стили -->
    <style>
        /* Базовые стили оставлены здесь для простоты */
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #info, #crosshair, #block-indicator, #help-text, #inventory-panel, #inventory-toggle-hint, #stats-panel { 
            position: absolute; z-index: 10; 
        }
        /* ... остальные стили как в исходном, плюс новые для stats-panel */
        #stats-panel {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #aaa;
            backdrop-filter: blur(5px);
            color: white;
            font-size: 18px;
            align-items: center;
        }
        .stat-bar {
            width: 150px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #888;
        }
        .stat-fill {
            height: 100%;
            width: 100%;
            transition: width 0.2s;
        }
        .health-fill { background: #ff4444; }
        .hunger-fill { background: #ffaa00; }
        .exp-fill { background: #44ff44; }
    </style>
</head>
<body>
    <!-- Информация сверху (координаты, режим) -->
    <div id="info">...</div>
    <!-- Прицел -->
    <div id="crosshair"></div>
    <!-- Индикатор блока -->
    <div id="block-indicator">...</div>
    <!-- Подсказки -->
    <div id="help-text">...</div>
    <!-- Инвентарь (скрыт по умолчанию) -->
    <div id="inventory-panel">...</div>
    <div id="inventory-toggle-hint">Нажмите B для инвентаря</div>
    
    <!-- Панель статистики (здоровье, голод, опыт) -->
    <div id="stats-panel">
        <div>❤️</div>
        <div class="stat-bar"><div class="stat-fill health-fill" id="health-fill" style="width: 100%;"></div></div>
        <div>🍖</div>
        <div class="stat-bar"><div class="stat-fill hunger-fill" id="hunger-fill" style="width: 100%;"></div></div>
        <div>✨</div>
        <div class="stat-bar"><div class="stat-fill exp-fill" id="exp-fill" style="width: 30%;"></div></div>
    </div>

    <!-- Подключение модулей -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
